services:
  - type: web
    name: wordmemory-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_EXPIRY_HOURS
        value: 24
      - key: LOG_LEVEL
        value: INFO
      - key: DEBUG
        value: false
    plan: starter
    region: singapore
    healthCheckPath: /api/words
